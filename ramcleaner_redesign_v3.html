<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RamCleaner v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #080809;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'JetBrains Mono', monospace;
}

:root {
  --ac: #00e5cc;
  --ac2: rgba(0,229,204,0.12);
  --ac3: rgba(0,229,204,0.4);
  --bg: #0c0c0f;
  --bg2: rgba(255,255,255,0.025);
  --bd: rgba(255,255,255,0.07);
  --t1: rgba(255,255,255,0.92);
  --t2: rgba(255,255,255,0.45);
  --t3: rgba(255,255,255,0.18);
}

.win {
  width: 280px;
  background: var(--bg);
  border-radius: 16px;
  border: 1px solid var(--bd);
  overflow: hidden;
  box-shadow: 0 40px 100px rgba(0,0,0,0.9);
}

/* ── HEADER ── */
.hdr {
  padding: 11px 14px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--bd);
}

.hdr-left {
  display: flex;
  align-items: center;
  gap: 6px;
}

.hdr-chip {
  font-size: 14px;
  font-weight: 700;
  color: var(--t1);
  letter-spacing: 0.2px;
}

.hdr-icon {
  color: var(--ac);
  font-size: 15px;
  filter: drop-shadow(0 0 5px var(--ac3));
}

/* live indicator */
.live-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--ac);
  box-shadow: 0 0 6px var(--ac3);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.5; transform:scale(0.8); }
}

/* ── HERO SECTION ── */
.hero {
  padding: 14px 14px 10px;
  position: relative;
}

/* background arc decoration */
.hero-bg {
  position: absolute;
  top: 0; right: -10px;
  width: 140px; height: 100px;
  background: radial-gradient(ellipse at 80% 20%, rgba(0,229,204,0.04) 0%, transparent 70%);
  pointer-events: none;
}

.hero-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}

.hero-left { flex:1; }

.mem-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--t2);
  letter-spacing: 1.5px;
  margin-bottom: 5px;
}

.big-num {
  display: flex;
  align-items: baseline;
  gap: 2px;
}

.big-num-val {
  font-size: 50px;
  font-weight: 800;
  color: var(--t1);
  letter-spacing: -3px;
  line-height: 1;
}

.big-num-pct {
  font-size: 18px;
  font-weight: 400;
  color: var(--t2);
  letter-spacing: 0;
}

.gb-row {
  margin-top: 4px;
  font-size: 12px;
  font-weight: 400;
  color: var(--t1);
  letter-spacing: 0.3px;
}

.gb-used { color: var(--ac); font-weight: 600; }

/* progress bar — thin elegant */
.prog-wrap {
  margin-top: 10px;
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
}

.prog-fill {
  height: 100%;
  width: 75%;
  background: linear-gradient(90deg, var(--ac), rgba(0,229,204,0.5));
  border-radius: 2px;
  box-shadow: 0 0 8px var(--ac3);
  position: relative;
}

.prog-fill::after {
  content:'';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 20px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
  border-radius: 2px;
}

/* ring */
.ring-wrap {
  position: relative;
  width: 56px; height: 56px;
  flex-shrink: 0;
}

.ring-wrap svg { transform: rotate(-90deg); }

.ring-inner {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.ring-val {
  font-size: 16px;
  font-weight: 700;
  color: var(--t1);
  letter-spacing: -0.5px;
}

.ring-sub {
  font-size: 9px;
  font-weight: 600;
  color: var(--t1);
  letter-spacing: 0.8px;
  margin-top: 1px;
}

/* ── STATS ROW ── */
.stats {
  display: flex;
  gap: 1px;
  margin: 0 14px 12px;
  background: var(--bd);
  border-radius: 10px;
  overflow: hidden;
}

.stat {
  flex: 1;
  background: var(--bg2);
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.stat:first-child { border-radius: 10px 0 0 10px; }
.stat:last-child  { border-radius: 0 10px 10px 0; }

.stat-lbl {
  font-size: 9px;
  font-weight: 600;
  color: var(--t1);
  letter-spacing: 1px;
}

.stat-val {
  font-size: 13px;
  font-weight: 700;
  color: var(--t1);
  letter-spacing: -0.3px;
}

.stat-val.warn { color: #fbbf24; }

/* ── PROCESSES ── */
.proc-hdr {
  display: flex;
  align-items: center;
  padding: 0 14px 6px;
  gap: 8px;
}

.proc-hdr-line { flex:1; height:1px; background: var(--bd); }

.proc-hdr-lbl {
  font-size: 9px;
  font-weight: 600;
  color: var(--t1);
  letter-spacing: 1.5px;
}

.procs { padding: 0 10px 10px; }

.proc {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 6px;
  border-radius: 7px;
  transition: background 0.12s;
  cursor: default;
}

.proc:hover { background: rgba(255,255,255,0.03); }

.proc-n {
  font-size: 10px;
  font-weight: 600;
  color: var(--ac);
  opacity: 0.45;
  width: 14px;
  flex-shrink: 0;
}

.proc-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--t1);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.proc-bar {
  width: 40px;
  height: 2px;
  background: rgba(255,255,255,0.06);
  border-radius: 1px;
  flex-shrink: 0;
  overflow: hidden;
}

.proc-bar-f {
  height: 100%;
  background: var(--ac);
  border-radius: 1px;
  opacity: 0.6;
}

.proc-mb {
  font-size: 11px;
  font-weight: 500;
  color: var(--t1);
  width: 50px;
  text-align: right;
  flex-shrink: 0;
}

/* ── BUTTONS ── */
.btns {
  display: flex;
  gap: 5px;
  padding: 2px 12px 10px;
}

.btn {
  flex: 1;
  height: 38px;
  background: rgba(255,255,255,0.035);
  border: 1px solid var(--bd);
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}

/* top shine */
.btn::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
}

.btn:hover {
  background: var(--ac2);
  border-color: rgba(0,229,204,0.35);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(0,229,204,0.15);
}

.btn:active { transform: translateY(0); }

.btn-ic { font-size: 16px; color: var(--ac); }
.btn-tx {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  color: var(--t1);
  letter-spacing: 0.1px;
}

/* ── THEME ── */
.theme {
  border-top: 1px solid var(--bd);
  padding: 8px 0 8px;
}

.theme-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 13px 7px;
}

.theme-lbl {
  font-size: 9px;
  font-weight: 600;
  color: var(--t3);
  letter-spacing: 1.5px;
}

.theme-cur {
  font-size: 9px;
  font-weight: 700;
  color: var(--ac);
  letter-spacing: 1px;
}

.swatches {
  display: flex;
  gap: 4px;
  padding: 2px 13px;
  overflow-x: auto;
  scrollbar-width: none;
  cursor: grab;
}

.sw {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}

.sw-box {
  width: 34px; height: 34px;
  border-radius: 9px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s;
  position: relative;
}

.sw.on .sw-box {
  box-shadow: 0 0 0 1.5px var(--swc), 0 0 10px color-mix(in srgb, var(--swc) 40%, transparent);
  background: rgba(255,255,255,0.06);
}

.sw-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--swc);
  box-shadow: 0 0 7px color-mix(in srgb, var(--swc) 60%, transparent);
  transition: transform 0.18s;
}

.sw.on .sw-dot { transform: scale(1.2); }

.sw-box::after {
  content:'';
  position: absolute;
  bottom: 3px; right: 3px;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--swc);
  opacity: 0;
  transform: scale(0);
  transition: all 0.18s;
}

.sw.on .sw-box::after { opacity:1; transform:scale(1); }

.sw-nm { display: none; }

/* ── FOOTER ── */
.foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 14px 8px;
  border-top: 1px solid var(--bd);
}

.quit {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--t3);
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; gap: 4px;
  transition: color 0.15s;
}

.quit:hover { color: var(--t2); }

.ref { font-size: 9px; color: rgba(255,255,255,0.15); letter-spacing: 0.4px; }

</style>
</head>
<body>
<div class="win" id="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-left">
      <span class="hdr-icon">󰘚</span>
      <span class="hdr-chip">Apple M4 · 16GB</span>
    </div>
    <div class="live-dot"></div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-top">
      <div class="hero-left">
        <div class="mem-label">MEMORY USAGE</div>
        <div class="big-num">
          <span class="big-num-val">75</span>
          <span class="big-num-pct">%</span>
        </div>
        <div class="gb-row">
          <span class="gb-used">12.1 GB</span>
          <span style="color:var(--t1)"> / </span>
          <span style="color:var(--t1)">16.0 GB</span>
        </div>
        <div class="prog-wrap">
          <div class="prog-fill"></div>
        </div>
      </div>
      <div class="ring-wrap">
        <svg width="56" height="56" viewBox="0 0 56 56">
          <circle cx="28" cy="28" r="22" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="4.5"/>
          <circle cx="28" cy="28" r="22" fill="none" stroke="var(--ac)"
            stroke-width="4.5" stroke-linecap="butt"
            stroke-dasharray="138.2" stroke-dashoffset="103.7"
            style="filter:drop-shadow(0 0 5px var(--ac3))"/>
        </svg>
        <div class="ring-inner">
          <span class="ring-val">3.9</span>
          <span class="ring-sub">FREE</span>
        </div>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <span class="stat-lbl">PRESSURE</span>
      <span class="stat-val warn">Medium</span>
    </div>
    <div class="stat">
      <span class="stat-lbl">SWAP</span>
      <span class="stat-val">2.0 GB</span>
    </div>
    <div class="stat">
      <span class="stat-lbl">CACHED</span>
      <span class="stat-val">3.1 GB</span>
    </div>
  </div>

  <!-- PROCESSES -->
  <div class="proc-hdr">
    <div class="proc-hdr-line"></div>
    <span class="proc-hdr-lbl">PROCESSES</span>
    <div class="proc-hdr-line"></div>
  </div>
  <div class="procs">
    <div class="proc"><span class="proc-n">01</span><span class="proc-name">Brave Browser He</span><div class="proc-bar"><div class="proc-bar-f" style="width:100%"></div></div><span class="proc-mb">617 MB</span></div>
    <div class="proc"><span class="proc-n">02</span><span class="proc-name">WindowServer</span><div class="proc-bar"><div class="proc-bar-f" style="width:75%"></div></div><span class="proc-mb">466 MB</span></div>
    <div class="proc"><span class="proc-n">03</span><span class="proc-name">Antigravity Help</span><div class="proc-bar"><div class="proc-bar-f" style="width:73%"></div></div><span class="proc-mb">450 MB</span></div>
    <div class="proc"><span class="proc-n">04</span><span class="proc-name">language_server_</span><div class="proc-bar"><div class="proc-bar-f" style="width:70%"></div></div><span class="proc-mb">430 MB</span></div>
    <div class="proc"><span class="proc-n">05</span><span class="proc-name">Brave Browser He</span><div class="proc-bar"><div class="proc-bar-f" style="width:66%"></div></div><span class="proc-mb">406 MB</span></div>
  </div>

  <!-- BUTTONS -->
  <div class="btns">
    <button class="btn"><span class="btn-ic">⟳</span><span class="btn-tx">Quick Clean</span></button>
    <button class="btn"><span class="btn-ic">◉</span><span class="btn-tx">Deep Clean</span></button>
  </div>

  <!-- THEME -->
  <div class="theme">
    <div class="theme-top">
      <span class="theme-lbl">THEME</span>
      <span class="theme-cur" id="themeCur">CYAN</span>
    </div>
    <div class="swatches" id="swatches"></div>
  </div>

  <!-- FOOTER -->
  <div class="foot">
    <button class="quit">⏻ Quit</button>
    <span class="ref">REFRESH 2S · v1.0</span>
  </div>

</div>
<script>
const themes=[
  {n:'AMBER', c:'#ff8c00'},{n:'MATRIX',c:'#00ff87'},{n:'ARCTIC',c:'#00c7ff'},
  {n:'COSMIC',c:'#a855f7'},{n:'ROSE',  c:'#fb7185'},{n:'GOLD',  c:'#f5c416'},
  {n:'CYAN',  c:'#00e5cc'},{n:'LAVA',  c:'#ff3a5c'},{n:'LIME',  c:'#84cc16'},
  {n:'SILVER',c:'#b0b8cc'}
];
let cur=6;
const box=document.getElementById('swatches');
const curLbl=document.getElementById('themeCur');

function pick(i){
  cur=i;
  const c=themes[i].c;
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  document.documentElement.style.setProperty('--ac',c);
  document.documentElement.style.setProperty('--ac2',`rgba(${r},${g},${b},0.1)`);
  document.documentElement.style.setProperty('--ac3',`rgba(${r},${g},${b},0.4)`);
  curLbl.textContent=themes[i].n;
  curLbl.style.color=c;
  document.querySelectorAll('.sw').forEach((el,j)=>el.classList.toggle('on',j===i));
}

themes.forEach((t,i)=>{
  const el=document.createElement('div');
  el.className='sw'+(i===cur?' on':'');
  el.style.setProperty('--swc',t.c);
  el.innerHTML=`<div class="sw-box"><div class="sw-dot"></div></div>`;
  el.onclick=()=>pick(i);
  box.appendChild(el);
});

// drag scroll
let dn=false,sx=0,sl=0;
box.addEventListener('mousedown',e=>{dn=true;sx=e.pageX-box.offsetLeft;sl=box.scrollLeft;box.style.cursor='grabbing';});
document.addEventListener('mouseup',()=>{dn=false;box.style.cursor='grab';});
box.addEventListener('mousemove',e=>{if(!dn)return;e.preventDefault();box.scrollLeft=sl-(e.pageX-box.offsetLeft-sx);});

pick(cur);
</script>
</body>
</html>
